global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'spring_boot_backend'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['host.docker.internal:8090']
        # Lưu ý: Nếu cài thẳng Prometheus trên Windows thay vì Docker, đối target thành ['localhost:8090']
